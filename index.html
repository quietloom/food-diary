<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Food diary capture</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/zxing-wasm@2/dist/iife/full/index.js" defer></script>
  <script type="module" src="js/app.js" defer></script>
</head>
<body>
  <main id="app">
    <div id="screen-scan" class="screen" data-screen="scan">
      <header class="topbar">
        <button id="menu-btn" aria-label="Menu">&#9776;</button>
        <span class="title">Food diary</span>
        <span class="spacer"></span>
      </header>
      <div id="scan-idle">
        <button id="scan-idle-btn" class="mock-button">Scan barcode</button>
      </div>
      <div id="scan-active" class="hidden">
        <video id="viewfinder" autoplay playsinline muted></video>
        <p id="scan-status" class="status"></p>
        <button id="scan-cancel-btn">Cancel</button>
        <p id="scan-fallback" class="status hidden">
          Can't find a barcode? <button id="scan-fallback-btn">Take a photo instead</button>
        </p>
      </div>
    </div>

    <nav id="menu" class="menu hidden">
      <button data-nav="quick-add">Quick-add</button>
      <button data-nav="photo">No barcode (photo)</button>
      <button data-nav="library">Library</button>
      <button data-nav="log">Daily Log</button>
      <button data-nav="export">Export</button>
      <button data-nav="timing">Timing</button>
      <button data-nav="scan">Close menu</button>
    </nav>

    <div id="confirm-card" class="card hidden"></div>

    <div id="screen-library" class="screen hidden" data-screen="library">
      <header class="topbar"><button class="back-btn" data-nav="scan">&larr;</button><span class="title">Food Library</span></header>
      <table class="list" id="library-table"><thead><tr><th>Code</th><th>Food</th><th>Barcode</th><th>Times used</th></tr></thead><tbody></tbody></table>
    </div>

    <div id="screen-log" class="screen hidden" data-screen="log">
      <header class="topbar"><button class="back-btn" data-nav="scan">&larr;</button><span class="title">Daily Log</span></header>
      <table class="list" id="log-table"><thead><tr><th>Day</th><th>Meal</th><th>Food</th><th>Qty</th><th>Photo</th></tr></thead><tbody></tbody></table>
    </div>

    <div id="screen-export" class="screen hidden" data-screen="export">
      <header class="topbar"><button class="back-btn" data-nav="scan">&larr;</button><span class="title">Export</span></header>
      <p id="export-summary"></p>
      <button id="export-share-btn" class="mock-button">Share diary export</button>
      <p id="export-status" class="status"></p>
    </div>

    <div id="screen-timing" class="screen hidden" data-screen="timing">
      <header class="topbar"><button class="back-btn" data-nav="scan">&larr;</button><span class="title">Timing</span></header>
      <p id="timing-status">Not running</p>
      <button id="timing-toggle">Start keying pass</button>
      <p id="timing-summary"></p>
    </div>

    <div id="screen-quick-add" class="screen hidden" data-screen="quick-add">
      <header class="topbar"><button class="back-btn" data-nav="scan">&larr;</button><span class="title">Quick-add</span></header>
      <input id="quick-add-search" placeholder="Search foods you've already logged">
      <table class="list" id="quick-add-table"><thead><tr><th>Food</th><th>Times used</th></tr></thead><tbody></tbody></table>
    </div>

    <div id="screen-photo" class="screen hidden" data-screen="photo">
      <header class="topbar"><button class="back-btn" data-nav="scan">&larr;</button><span class="title">No barcode</span></header>
      <video id="photo-viewfinder" autoplay playsinline muted></video>
      <button id="photo-capture-btn">Take photo</button>
      <p id="photo-status" class="status"></p>
    </div>
  </main>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    }
  </script>
</body>
</html>
